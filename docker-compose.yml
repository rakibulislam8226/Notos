services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - database_url
    ports:
      - "3000:3000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_data:/app/media
    restart: unless-stopped

volumes:
  media_data:

# Docker Compose automatically loads .env — DATABASE_URL from there is used as the build secret.
# Never stored in any image layer.
secrets:
  database_url:
    environment: DATABASE_URL
